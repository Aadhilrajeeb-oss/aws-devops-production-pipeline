<svg width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#444" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">AWS Free Tier Architecture - DevOps Assignment</text>

  <!-- Developer / GitHub -->
  <rect x="30" y="70" width="140" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7"/>
  <text x="100" y="95" text-anchor="middle" font-size="13" fill="#26215C">Developer</text>
  <text x="100" y="113" text-anchor="middle" font-size="11" fill="#3C3489">git push</text>

  <rect x="30" y="160" width="140" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7"/>
  <text x="100" y="185" text-anchor="middle" font-size="13" fill="#26215C">Git Repository</text>
  <text x="100" y="203" text-anchor="middle" font-size="11" fill="#3C3489">source of truth</text>

  <!-- Jenkins -->
  <rect x="230" y="160" width="160" height="60" rx="8" fill="#FAEEDA" stroke="#854F0B"/>
  <text x="310" y="185" text-anchor="middle" font-size="13" fill="#412402">Jenkins CI/CD</text>
  <text x="310" y="203" text-anchor="middle" font-size="11" fill="#633806">build, test, deploy</text>

  <!-- Docker Hub -->
  <rect x="450" y="160" width="150" height="60" rx="8" fill="#FAEEDA" stroke="#854F0B"/>
  <text x="525" y="185" text-anchor="middle" font-size="13" fill="#412402">Docker Registry</text>
  <text x="525" y="203" text-anchor="middle" font-size="11" fill="#633806">image storage</text>

  <!-- AWS VPC Container -->
  <rect x="230" y="270" width="560" height="290" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="250" y="295" font-size="14" font-weight="bold" fill="#04342C">AWS VPC (ap-south-1) - 10.0.0.0/16</text>

  <!-- Public subnet -->
  <rect x="250" y="315" width="300" height="220" rx="10" fill="#9FE1CB" stroke="#0F6E56"/>
  <text x="265" y="335" font-size="12" font-weight="bold" fill="#04342C">Public Subnet - 10.0.1.0/24</text>

  <!-- Security group box -->
  <rect x="265" y="350" width="270" height="165" rx="8" fill="#ffffff" stroke="#0F6E56" stroke-dasharray="4,3"/>
  <text x="280" y="368" font-size="11" fill="#04342C">Security Group: 80/443 open, 22 restricted</text>

  <!-- EC2 instance -->
  <rect x="280" y="380" width="240" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="400" y="402" text-anchor="middle" font-size="13" fill="#04342C">EC2 t2.micro</text>
  <text x="400" y="420" text-anchor="middle" font-size="11" fill="#0F6E56">Nginx + Docker (Django REST API)</text>

  <!-- IAM role -->
  <rect x="280" y="450" width="240" height="45" rx="8" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="400" y="470" text-anchor="middle" font-size="12" fill="#04342C">IAM Role (least privilege)</text>
  <text x="400" y="486" text-anchor="middle" font-size="10" fill="#0F6E56">CloudWatch + scoped S3 access</text>

  <!-- CloudWatch agent tag -->
  <rect x="280" y="500" width="240" height="35" rx="8" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="400" y="522" text-anchor="middle" font-size="11" fill="#04342C">CloudWatch Agent (metrics + logs)</text>

  <!-- S3 -->
  <rect x="580" y="380" width="180" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="670" y="402" text-anchor="middle" font-size="13" fill="#04342C">S3 Bucket</text>
  <text x="670" y="420" text-anchor="middle" font-size="11" fill="#0F6E56">static assets / backups</text>

  <!-- CloudWatch -->
  <rect x="580" y="460" width="180" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="670" y="482" text-anchor="middle" font-size="13" fill="#04342C">CloudWatch</text>
  <text x="670" y="500" text-anchor="middle" font-size="11" fill="#0F6E56">dashboards + alarms</text>

  <!-- End user -->
  <rect x="230" y="70" width="160" height="60" rx="8" fill="#FAECE7" stroke="#993C1D"/>
  <text x="310" y="95" text-anchor="middle" font-size="13" fill="#4A1B0C">End User / Load Test</text>
  <text x="310" y="113" text-anchor="middle" font-size="11" fill="#712B13">HTTPS request</text>

  <!-- Arrows -->
  <line x1="100" y1="130" x2="100" y2="158" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="170" y1="190" x2="228" y2="190" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="190" x2="448" y2="190" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="310" y1="220" x2="400" y2="378" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="3,3"/>
  <line x1="525" y1="220" x2="400" y2="378" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="3,3"/>
  <line x1="310" y1="130" x2="310" y2="380" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="405" x2="580" y2="405" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="520" y1="480" x2="580" y2="485" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <text x="30" y="580" font-size="11" fill="#555">Solid arrows: request/data flow. Dashed arrows: CI/CD deployment path.</text>
  <text x="30" y="598" font-size="11" fill="#555">All resources sized for AWS Free Tier (t2.micro, single AZ, no NAT Gateway).</text>
</svg>
