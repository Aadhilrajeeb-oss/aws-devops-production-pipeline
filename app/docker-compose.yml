version: "3.8"

services:
  web:
    build: .
    restart: unless-stopped
    environment:
      - DJANGO_DEBUG=false
      - DJANGO_ALLOWED_HOSTS=*
    expose:
      - "8000"
    volumes:
      - app_data:/app

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

volumes:
  app_data:
